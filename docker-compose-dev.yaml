services:
  postgres:
    image: postgres:15.2
    environment:
      POSTGRES_DB: keycloak_dev
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_new:/var/lib/postgresql/data
  keycloak:
    image: quay.io/keycloak/keycloak:26.5.7
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_URL_PORT: 5432
      KC_DB_URL_DATABASE: keycloak_dev
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: password
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    command: start-dev
    ports:
      - "8080:8080"
    depends_on:
      - postgres
  admin-management:
    image: restaurant-api/admin-management:0.0.1-test
    ports:
      - "8081:8080"
    depends_on:
      - postgres
  inventory-management:
    image: restaurant-api/inventory-management:0.0.1-test
    ports:
      - "8082:8080"
    depends_on:
      - postgres
  api-gateway:
    image: restaurant-api/api-gateway:0.0.1-test
    ports:
      - "8090:8090"
    depends_on:
      - keycloak
volumes:
  postgres_data_new:
